name: Run UnitTests via Pytest

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  workflow_dispatch:
  

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install pandas
      - name: Run pytest
        run: |
          pytest
