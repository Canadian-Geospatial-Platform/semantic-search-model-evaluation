version: 0.2

env:
  variables:
    ENV: stage                 
    PYTHONPATH: src

phases:
  install:
    runtime-versions:
      python: 3.10
    commands:
      - echo Installing dependencies
      - python -m pip install --upgrade pip
      - pip install pytest pandas pyarrow

  pre_build:
    commands:
      - echo Environment: $ENV
      - echo Running tests from: $PYTHONPATH

  build:
    commands:
      - echo Starting pytest...
      - pytest

  post_build:
    commands:
      - echo Tests completed.

artifacts:
  type: NO_ARTIFACTS